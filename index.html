<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind UI - Modern Script</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #090514);
        }
        /* Grid de fondo moderno */
        .bg-grid {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center overflow-hidden px-4">

    <div class="absolute inset-0 bg-grid z-0"></div>
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-sky-500/10 blur-[120px] rounded-full z-0"></div>
    <div class="absolute bottom-1/4 left-1/3 w-[400px] h-[400px] bg-indigo-500/10 blur-[100px] rounded-full z-0"></div>

    <div id="main-card" class="relative z-10 w-full max-w-md bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl shadow-black/50 animate__animated">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-sky-500/10 border border-sky-500/20 text-sky-400 text-xs font-medium mb-3 tracking-wide uppercase">
                <span class="flex h-2 w-2 rounded-full bg-sky-400 animate-pulse"></span>
                Wind UI v2.0
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">
                Sprint UI
            </h1>
            <p class="text-slate-400 text-sm">
                Modern script execution interface
            </p>
        </div>

        <div class="relative group mb-6">
            <div class="absolute -inset-px bg-gradient-to-r from-sky-500 to-indigo-500 rounded-xl opacity-20 group-hover:opacity-40 transition duration-300"></div>
            <div class="relative bg-slate-950/80 rounded-xl p-4 border border-slate-800/80">
                <div class="flex items-center justify-between mb-2 pb-2 border-b border-slate-800/60">
                    <div class="flex gap-1.5">
                        <span class="w-3 h-3 rounded-full bg-slate-700"></span>
                        <span class="w-3 h-3 rounded-full bg-slate-700"></span>
                        <span class="w-3 h-3 rounded-full bg-slate-700"></span>
                    </div>
                    <span class="text-[10px] text-slate-500 font-mono">lua</span>
                </div>
                <code id="script-text" class="block text-xs font-mono text-sky-400 break-all select-all leading-relaxed">
                    loadstring(game:HttpGet("https://pastebin.com/raw/vWpKBuTA"))()
                </code>
            </div>
        </div>

        <button onclick="copyScript()" class="relative w-full group overflow-hidden rounded-xl p-[1px] focus:outline-none dynamic-btn">
            <span class="absolute inset-0 bg-gradient-to-r from-sky-400 via-indigo-500 to-purple-500 rounded-xl"></span>
            <div class="relative px-6 py-3.5 bg-slate-950 rounded-[11px] transition-all duration-200 group-hover:bg-transparent text-white font-semibold text-sm text-center tracking-wide">
                Copiar Script
            </div>
        </button>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 bg-slate-900 border border-emerald-500/30 text-emerald-400 px-4 py-2.5 rounded-xl shadow-xl shadow-black/40 text-sm font-medium translate-y-20 opacity-0 transition-all duration-300 cubic-bezier(0.16, 1, 0.3, 1)">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        Script copiado al portapapeles
    </div>

    <script>
        // --- ANIMACIONES ALEATORIAS DE ENTRADA ---
        const modernAnimations = [
            'animate__fadeInUp',
            'animate__zoomIn',
            'animate__slideInUp',
            'animate__backInDown'
        ];
        
        // Selecciona una animación aleatoria para la tarjeta
        const randomAnim = modernAnimations[Math.floor(Math.random() * modernAnimations.length)];
        document.getElementById('main-card').classList.add(randomAnim);

        // --- FUNCIÓN DE COPIADO ---
        function copyScript() {
            const textToCopy = document.getElementById('script-text').innerText.trim();
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById('toast');
                
                // Mostrar Toast
                toast.classList.remove('translate-y-20', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
                
                // Ocultar Toast después de 2.5 segundos
                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 2500);
            });
        }
    </script>
</body>
</html>
